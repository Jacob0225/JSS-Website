<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jacob's Silly Server</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.png" type="image/x-icon">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Roboto', sans-serif;
    background-image: url('background.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    color: #fff;
    min-height: 100vh;
    line-height: 1.6;
}

body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 0;
}

header, main, footer { position: relative; z-index: 1; }

header { text-align: center; padding: 3rem 1rem; }

header h1 {
    font-size: 3rem;
    margin-bottom: 1rem;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
}

header p { font-size: 1.2rem; margin-bottom: 2rem; }

.buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1rem;
}

.buttons a {
    text-decoration: none;
    padding: 0.8rem 1.5rem;
    background: rgba(255,255,255,0.25);
    color: #fff;
    border-radius: 12px;
    font-weight: bold;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.buttons a:hover {
    background: rgba(255,255,255,0.35);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
}

main { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }

section {
    background: rgba(0,0,0,0.7);
    padding: 2rem;
    border-radius: 15px;
    margin-bottom: 2rem;
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    text-align: center;
    gap: 2rem;
}

.server-box {
    flex: 1 1 250px; /* flexible width, min 250px */
    background: rgba(255,255,255,0.05);
    padding: 1.5rem;
    border-radius: 12px;
}

.server-box h2 {
    font-size: 1.8rem;
    border-bottom: 2px solid #fff;
    display: inline-block;
    margin-bottom: 1rem;
    padding-bottom: 0.3rem;
}

.server-address {
    font-size: 1.2rem;
    margin-top: 0.8rem;
    color: #ffd700;
    cursor: pointer;
    user-select: none;
}

footer { text-align: center; padding: 2rem 1rem; font-size: 0.9rem; color: #ccc; }
a { color: #fff; text-decoration: underline; }

@media (max-width: 600px) {
    header h1 { font-size: 2.2rem; }
    header p { font-size: 1rem; }
    .server-address { font-size: 1rem; }
}
</style>
</head>
<body>
<header>
    <h1>Jacob's Silly Server</h1>
    <p>Join JSS and have fun with the community!</p>
    <div class="buttons">
        <a href="https://discord.gg/hEhv6ugKDs" target="_blank">Discord</a>
        <a href="http://map.jacobssillyserver.com:25580/" target="_blank">Server Map</a>
        <a href="https://ko-fi.com/jacob0225" target="_blank">Donate</a>
    </div>
</header>

<main>
    <section>
        <div class="server-box">
            <h2>Java</h2>
            <div class="server-address" onclick="copyToClipboard('play.jacobssillyserver.com')">
                play.jacobssillyserver.com
            </div>
        </div>

        <div class="server-box">
            <h2>Bedrock</h2>
            <div class="server-address" onclick="copyToClipboard('130.12.156.44:25760')">
                130.12.156.44:25760
            </div>
            <p style="margin-top:0.5rem; font-size:0.9rem; color:#ccc;">Subject to change</p>
        </div>
    </section>
</main>

<footer>
    &copy; 2026 Jacob0225
</footer>

<script>
function copyToClipboard(text) {
    navigator.clipboard.writeText(text)
    .then(() => { alert('Copied: ' + text); })
    .catch(() => { alert('Failed to copy.'); });
}
</script>
</body>
</html>
